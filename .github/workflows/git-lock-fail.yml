name: 'master lock validator'

on:
  pull_request:
    branches: [master]
    paths:
      - '.git-lock'

permissions:
  contents: read

jobs:
  git-locked:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - run: exit 1
